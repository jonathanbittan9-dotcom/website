<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" type="image/jpg" href="/images/disocrd logo.png">
        <title>this is a form webpage</title>
    </head>
    <body>
        <form action="index.php" method="Post" enctype="multipart/form-data">

            <label for="username">username:</label>
            <input type="text" id="username" minlength="6" placeholder="Enter a username:" maxlength="15" >
            
            
            <br>
            <label for="password">password:</label>
            <input type="password" id="password" minlength="6" maxlength="15"placeholder="Enter a password:">
            <br>
            <label for="email">Email:</label>
            <input type="email" id="email:" placeholder="Enter a Email:">
            <br>
            <label for="phone">Enter a phone number:</label>
            <input type="tel" id="phone" placeholder="123-456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
            <br>
            <label for="bday">birth date:</label>
            <input type="date" id="bday">
            <br>
            <label for="quantity">quantity:</label>
            <input type="number" id="quantity" min="0" max="99" value="1">
            <br>
            <label for="Mr.">Mr.</label>
            <input type="radio">
            <br>
            <label for="Mrs.">Mrs.</label>
            <input type="radio">
            <br>
            <label for="Phd.">PhD</label>
            <input type="radio">
            <br>
            <label for="payment">Enter a payment:</label>
            <select i="payment">
                <option value="visa">Visa</option>
                <option value="mastercard">mastercard</option>
                <option value="giftcard">giftcard</option>
            </select>
            <br>
            <label for="subscribe">subscribe:</label>
            <input type="checkbox" id="subscribe">
            <br>
            <label for="comment">comment:</label>
            <textarea id="comment" rows="3" cols="25"></textarea>
            <br>
            <label for="file">Enter a file:</label>
            <input type="file" id="file" accept="image/png, image/jpeg">
            <br>
            <input type="submit">
            <br>
            <input type="reset">
           




        </form>
    </body>
</html>
